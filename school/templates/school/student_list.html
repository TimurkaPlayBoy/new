{% extends 'school/base.html' %}

{% block content %}
<h2>Students</h2>
<p><a href="{% url 'add_student' %}">Add Student</a></p>
<table border="1" cellpadding="5" cellspacing="0">
<thead>
<tr><th>Full Name</th><th>Class</th><th>Actions</th></tr>
</thead>
<tbody>
{% for s in students %}
<tr>
<td>{{ s.full_name }}</td>
<td>{{ s.school_class.name }}</td>
<td>
<a href="{% url 'edit_student' s.pk %}">Edit</a> |
<a href="{% url 'delete_student' s.pk %}">Delete</a>
</td>
</tr>
{% empty %}
<tr><td colspan="3">No students found.</td></tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
