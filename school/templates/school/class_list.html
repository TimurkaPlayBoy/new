{% extends 'school/base.html' %}

{% block content %}
<h2>Classes</h2>
<p><a href="{% url 'add_class' %}">Add Class</a></p>
<table border="1" cellpadding="5" cellspacing="0">
<thead>
<tr><th>Name</th><th>Actions</th></tr>
</thead>
<tbody>
{% for c in classes %}
<tr>
<td>{{ c.name }}</td>
<td>
<a href="{% url 'edit_class' c.pk %}">Edit</a> |
<a href="{% url 'delete_class' c.pk %}">Delete</a>
</td>
</tr>
{% empty %}
<tr><td colspan="2">No classes found.</td></tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
