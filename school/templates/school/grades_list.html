{% extends 'school/base.html' %}

{% block content %}
<h2>Grades</h2>
<table border="1">
    <tr>
        <th>Student</th>
        <th>Uroks</th>
        <th>Value</th>
    </tr>
    {% for g in grades %}
    <tr>
        <td>{{ g.student.name }}</td>
        <td>{{ g.uroks.name }}</td>
        <td>{{ g.value }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
