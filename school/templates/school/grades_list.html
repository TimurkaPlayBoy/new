{% extends 'school/base.html' %}

{% block content %}
<h2>Grades List</h2>

<!-- Пошук -->
<form method="get">
    <input type="text" name="q" placeholder="Search by student or subject" value="{{ query|default:'' }}">
    <button type="submit">Search</button>
</form>

<!-- Додати нову оцінку -->
<p><a href="{% url 'add_grade' %}">Add Grade</a></p>

<!-- Таблиця оцінок -->
<table border="1" cellpadding="5" cellspacing="0">
    <thead>
        <tr>
            <th>Student</th>
            <th>Subject</th>
            <th>Value</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for grade in grades %}
        <tr>
            <td>{{ grade.student.full_name }}</td>
            <td>{{ grade.uroks.name }}</td>
            <td>{{ grade.value }}</td>
            <td>
                <a href="{% url 'edit_grade' grade.pk %}">Edit</a> |
                <a href="{% url 'delete_grade' grade.pk %}">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No grades found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
